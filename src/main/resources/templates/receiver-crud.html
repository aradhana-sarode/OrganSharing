<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipient Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/receiver-crud.css}">
	    <style>
        .table-container { margin-top: 50px; }
        .status-badge { width: 100px; }
    </style>
</head>
<body>

<div class="container mt-4">

    <div class="card p-3">

        <div class="d-flex justify-content-between mb-3">
            <h3>Receiver Requests</h3>
            <span th:text="${#lists.size(recipients)} + ' Requests'"></span>
        </div>

        <table class="table table-bordered">

            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Blood</th>
                    <th>Organ</th>
                    <th>City</th>
                    <th>Contact</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="item : ${recipients}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.bloodGroup}"></td>
                    <td th:text="${item.requiredOrgan}"></td>
                    <td th:text="${item.city}"></td>
                    <td th:text="${item.number}"></td>

                    <td>
                        <span th:text="${item.status}"></span>
                    </td>

                    <td>
                        <a th:href="@{/receiver/findMatch/{id}(id=${item.id})}" 
                           class="btn btn-sm btn-primary">Match</a>

                        <a th:href="@{/receiver/delete/{id}(id=${item.id})}" 
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(recipients)}">
                    <td colspan="8" class="text-center text-muted">No Data Found</td>
                </tr>

            </tbody>

        </table>

        <div class="d-flex justify-content-between">
            <!-- ✅ FIXED LINK -->
            <a th:href="@{/receiver/form}" class="btn btn-success">Add Receiver</a>
            <a th:href="@{/dashboard}" class="btn btn-secondary">Back</a>
        </div>

    </div>

</div>

</body>
</html>
