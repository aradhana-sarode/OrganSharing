<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Donor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4 text-success">Edit Donor</h3>

        <!-- FORM -->
        <form th:action="@{/donor/update}" 
              th:object="${donor}" 
              method="post">

            <!-- Hidden ID -->
            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" th:field="*{age}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Blood Group</label>
                <input type="text" th:field="*{bloodGroup}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Organ</label>
                <input type="text" th:field="*{organ}" class="form-control">
            </div>

            <div class="mb-3">
                <label>City</label>
                <input type="text" th:field="*{city}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Contact</label>
                <input type="text" th:field="*{number}" class="form-control">
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">
                    Update
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
