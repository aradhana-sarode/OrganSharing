<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donor Form</title>
    <link rel="stylesheet" th:href="@{/donor.css}">
</head>
<body>

<div class="container">

    <!-- Card -->
    <div class="card">

        <h2>Donator Application </h2>

        <div class="top-links">
            <a th:href="@{/donor/list}">📋 View Donor List</a>
        </div>

        <!-- FORM -->
        <form th:action="@{/donor/save}" method="post">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="number" name="age" placeholder="Age" required>

            <select name="bloodGroup" required>
				<option value="">Select Blood Group</option>
				   <option value="A+">A+</option>
				   <option value="A-">A-</option>
				   <option value="B+">B+</option>
				   <option value="B-">B-</option>
				   <option value="AB+">AB+</option>
				   <option value="AB-">AB-</option>
				   <option value="O+">O+</option>
				   <option value="O-">O-</option>
            </select>

			<select name="Organ" required>
			    <option value="">Select Organ</option>

			    <option value="Kidney">Kidney</option>
			    <option value="Liver">Liver</option>
			    <option value="Heart">Heart</option>
			    <option value="Lungs">Lungs</option>
			    <option value="Pancreas">Pancreas</option>
			    <option value="Intestine">Intestine</option>

			    <option value="Cornea">Cornea (Eyes)</option>
			    <option value="Skin">Skin</option>
			    <option value="Bone Marrow">Bone Marrow</option>
			    <option value="Bone">Bone</option>
			    <option value="Heart Valve">Heart Valve</option>
			</select>

			<div class="row">
						    <input type="text" name="city" placeholder="City" required>

						    <input type="text"
						           name="number"
						           placeholder="Contact Number"
						           required
						           pattern="[0-9]{10}"
						           maxlength="10"
						           title="Enter exactly 10 digit mobile number">
						</div>


            <button type="submit">Save Donor</button>
        </form>

        <!-- Success Message -->
        <p th:text="${message}" class="success"></p>

        <!-- Back -->
        <a th:href="@{/dashboard}" class="back">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
