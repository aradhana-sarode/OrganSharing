<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Receiver Form</title>
    <link rel="stylesheet" th:href="@{/receiver.css}">
</head>
<body>

<div class="container">

    <div class="card">

        <h2 class="title">Finder Application</h2>

        <p th:if="${message}" class="success" th:text="${message}"></p>
        <p th:if="${error}" class="error" th:text="${error}"></p>

        <form th:action="@{/receiver/save}" method="post">

            <div class="row">
                <input type="text" name="name" placeholder="Receiver Name" required>
                <input type="number" name="age" placeholder="Age" required>
            </div>

            <select name="bloodGroup" required>
				<option value="">Select Blood Group</option>
				   <option value="A+">A+</option>
				   <option value="A-">A-</option>
				   <option value="B+">B+</option>
				   <option value="B-">B-</option>
				   <option value="AB+">AB+</option>
				   <option value="AB-">AB-</option>
				   <option value="O+">O+</option>
				   <option value="O-">O-</option>
            </select>

			<select name="requiredOrgan" required>
			    <option value="">Select Organ Needed</option>

			    <option value="Kidney">Kidney</option>
			    <option value="Liver">Liver</option>
			    <option value="Heart">Heart</option>
			    <option value="Lungs">Lungs</option>
			    <option value="Pancreas">Pancreas</option>
			    <option value="Intestine">Intestine</option>

			    <option value="Cornea">Cornea (Eyes)</option>
			    <option value="Skin">Skin</option>
			    <option value="Bone Marrow">Bone Marrow</option>
			    <option value="Bone">Bone</option>
			    <option value="Heart Valve">Heart Valve</option>
			</select>

			<div class="row">
			    <input type="text" name="city" placeholder="City" required>

			    <input type="text"
			           name="number"
			           placeholder="Contact Number"
			           required
			           pattern="[0-9]{10}"
			           maxlength="10"
			           title="Enter exactly 10 digit mobile number">
			</div>

            <button type="submit">Save Receiver</button>
        </form>

        <div class="links">
            <a th:href="@{/receiver/list}">View List</a>
            <a th:href="@{/dashboard}">Back</a>
        </div>

    </div>

</div>

</body>
</html>
