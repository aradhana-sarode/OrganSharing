<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donor Form</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<h2>Donor Registration</h2>

<a th:href="@{/donor/list}"> Donor List </a>

<form th:action="@{/donor/save}" method="post">
	
	
	
    <input type="text" name="name" placeholder="Donor Name" required>
    <input type="number" name="age" placeholder="Age" required>

    <select name="bloodGroup">
        <option value="A+">A+</option>
        <option value="B+">B+</option>
        <option value="O+">O+</option>
        <option value="AB+">AB+</option>
    </select>

    <input type="text" name="organ" placeholder="Organ (Kidney, Liver, etc.)" required>
	<input type="text" name="city" placeholder="City" required>

    <input type="text" name="number" placeholder="Contact Number" required>

    <button type="submit">Save Donor</button>
</form>

<p th:text="${message}" style="color:green;"></p>

<a th:href="@{/dashboard}">Back to Dashboard</a>

</body>
</html>
